<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation de commande - GameStore</title>
    <link rel="stylesheet" href="style.css?v=20260303-6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .confirmation-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .confirmation-header i {
            font-size: 5em;
            color: #00c853;
            margin-bottom: 30px;
            display: block;
        }

        .confirmation-header h1 {
            color: #1a237e;
            margin-bottom: 20px;
        }

        .confirmation-header p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .back-home {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #00c853, #64dd17);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <div class="confirmation-header">
            <i class="fas fa-check-circle"></i>
            <h1>Commande confirmee !</h1>
            <p>Merci pour votre achat. Votre commande a ete enregistree avec succes.</p>
        </div>

        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> Retour a l'accueil
        </a>
    </div>

    
    </script>
    <script src="script.js?v=20260303-6"></script>
</body>

</html>
